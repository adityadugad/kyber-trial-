services:
  - type: web
    name: oqs-trial
    runtime: python
    buildCommand: |
      apt-get update
      apt-get install -y cmake build-essential libssl-dev git

      git clone https://github.com/open-quantum-safe/liboqs
      cd liboqs
      mkdir build && cd build
      cmake -DOQS_BUILD_ONLY_LIB=ON ..
      make -j
      make install
      ldconfig

      cd ../../
      pip install -r requirements.txt

    startCommand: gunicorn app:app